services:
  postgres:
    image: postgres:16
    container_name: agents_console_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agents_console
    ports:
      - "5434:5432"
    volumes:
      - agents_console_pg:/var/lib/postgresql/data

volumes:
  agents_console_pg:
