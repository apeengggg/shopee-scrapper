services:
  postgres:
    image: postgres:16
    container_name: landing_pages_agent_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landing_pages_agent
    ports:
      - "5433:5432"
    volumes:
      - landing_pages_agent_pg:/var/lib/postgresql/data

volumes:
  landing_pages_agent_pg:
